apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      # In-cluster HashiCorp Vault (dev mode), KV v2 mounted at secret/.
      server: http://vault.vault.svc:8200
      path: secret
      version: v2
      auth:
        # The controller's ServiceAccount token is validated by Vault's
        # Kubernetes auth method (role written by the vault-config Job). No
        # static credentials are stored in the cluster.
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
