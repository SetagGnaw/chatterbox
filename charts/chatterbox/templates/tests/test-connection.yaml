apiVersion: v1
kind: Pod
metadata:
  name: {{ include "chatterbox.fullname" . }}-test-connection
  labels:
    {{- include "chatterbox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  containers:
    - name: wget
      image: busybox:1.37.0
      command:
        - wget
      args:
        - {{ printf "http://%s:%v/readyz" (include "chatterbox.fullname" .) .Values.service.port | quote }}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault

