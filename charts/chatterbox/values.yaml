# yaml-language-server: $schema=values.schema.json
replicaCount: 2

image:
  repository: chatterbox
  tag: local
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 64Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 1
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}

# HTTP ingress. Disabled by default; the dev overlay turns it on. Note a bare
# kind cluster has no ingress controller, so the object exists but does not
# route until one is installed.
ingress:
  enabled: false
  className: ""
  host: chatterbox.localdev.me

# cert-manager TLS. When enabled, a Certificate is issued by the named
# ClusterIssuer into <fullname>-tls and referenced by the ingress.
tls:
  enabled: false
  issuerName: selfsigned

# external-secrets. When enabled, an ExternalSecret syncs a Secret named
# <fullname>-env from the named ClusterSecretStore and the Deployment loads it
# via envFrom. remoteKey is the secret path (KV v2 path under the store's
# mount); remoteProperty (optional) selects a field within that secret.
externalSecret:
  enabled: false
  storeName: vault-backend
  refreshInterval: 1h
  data:
    - secretKey: GREETING
      remoteKey: chatterbox/dev
      remoteProperty: greeting
