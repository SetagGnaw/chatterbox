replicaCount: 2

image:
  repository: chatterbox
  tag: local
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 64Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 10
  readiness:
    path: /readyz
    initialDelaySeconds: 1
    periodSeconds: 5

nodeSelector: {}
tolerations: []
affinity: {}
