name: CI

on:
  pull_request:
  push:
    branches:
      - main
    # A promotion merge only rewrites the desired-state file (the release job's
    # own edit). Skip CI for pushes that change nothing else, so CI does not
    # re-trigger release and open a fresh promotion PR after every promotion.
    paths-ignore:
      - 'gitops/environments/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Test, lint, render, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run tests
        run: make test

      - name: Vet
        run: make vet

      - name: Lint Helm chart
        run: make helm-lint

      - name: Render Helm templates
        run: make helm-template

      - name: Build image
        run: make image IMAGE=chatterbox:${{ github.sha }}
