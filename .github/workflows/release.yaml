name: Release and propose dev promotion

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Publish immutable image and propose GitOps promotion
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
      pull-requests: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: >-
            ghcr.io/setaggnaw/chatterbox:${{
            github.event.workflow_run.head_sha }}
          build-args: |
            VERSION=${{ github.event.workflow_run.head_sha }}

      - name: Update dev desired state with the registry digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          yq -i \
            '.image.digest = strenv(DIGEST) |
             .image.tag = strenv(HEAD_SHA)' \
            gitops/environments/dev/values.yaml
          git diff gitops/environments/dev/values.yaml

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: promote/dev
          commit-message: >-
            Promote dev to
            ${{ github.event.workflow_run.head_sha }}
          title: >-
            Promote dev to
            ${{ github.event.workflow_run.head_sha }}
          body: |
            Automated promotion of the dev desired state.

            - Source commit: ${{ github.event.workflow_run.head_sha }}
            - Image: `ghcr.io/setaggnaw/chatterbox@${{
              steps.push.outputs.digest }}`
